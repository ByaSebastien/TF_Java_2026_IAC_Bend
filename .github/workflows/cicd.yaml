name: cicd

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v7
      - name: Set up Java 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'
          cache: maven
      - name: Build
        run: ./mvnw -B clean package -DskipTests
      - name: Publish
        run: mkdir -p publish && cp target/*.jar publish/
      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: spring-boot-artifact
          path: ./publish

  deploy:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download artifact
        uses: actions/download-artifact@v8
        with:
          name: spring-boot-artifact
          path: ./publish
      - name: Login to Azure
        uses: azure/login@v3
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}
      - name: Deploy to Azure
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'tf-java-2026-web-app'
          package: './publish/*.jar'
